services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: student_hub
      POSTGRES_USER: student_hub
      POSTGRES_PASSWORD: student_hub
    ports:
      - "5432:5432"
    volumes:
      - student_hub_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U student_hub -d student_hub"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  student_hub_pg:

